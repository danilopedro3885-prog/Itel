<!DOCTYPE html>
<html lang="PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style/login.css">
</head>

<body>
    <main class="container">
        <form action="">
            <h1>Login</h1>
            <div class="input">
                <input placeholder="Usuário" type="email" required>
                <img src="incones/contacto.png.png" alt="ícone contacto" class="icones">
            </div>
            <div class="input">
                <input placeholder="Senha" type="password" required>
                <img src="incones/cadeado.png" alt="ícone do site" class="icones">
            </div>

            <div class="lembrar">
                <label>
                    <input type="checkbox">
                    Lembrar a senha
                </label>
                <a href="#">Esqueci a minha senha</a>
            </div>

            <button type="submit" class="login">Login</button>

            <div class="cadastrar">
                <p>Não tem uma conta? <a href="#">Cadastrar</a></p>
            </div>
        </form>
    </main>

    <script src="JavaScript/login.js"></script>
</body>

</html>
